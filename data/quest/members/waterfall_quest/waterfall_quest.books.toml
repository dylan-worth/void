[book_on_baxtorian]
title = "Book on Baxtorian"
pages = [
    [
        "The missing relics",
        "",
        "    Many artefacts of elven",
        "history were lost after the",
        "fourth age. The greatest loss",
        "to our collections were the",
        "hidden treasures of Baxtorian.",
        "  Some believe these treasures",
        "are still unclaimed, but it is",
        "more commonly believed that",
        "dwarf miners recovered the",
        "treasure at the beginning of",
        "the third age.",
        "  Another great loss was",
        "Glarial's pebble, a key which",
        "allowed her family to visit",
        "her tomb. The stone was last",
        "seen in the possession of a",
        "wandering gnome who is now",
        "imprisoned in a dungeon near",
        "the Tree Gnome Village.",
        "",
    ],
    [
        "The sonnet of Baxtorian",
        "",
        "The love between Baxtorian",
        "and Glarial was said to have",
        "lasted over a century. They",
        "lived a peaceful life learning",
        "and teaching the laws of",
        "nature. When Baxtorian's",
        "kingdom was invaded by dark",
        "forces he left on a five year",
        "campaign. He returned to find",
        "his people slaughtered and his",
        "wife taken.",
        "    After years of searching",
        "he finally gave up and returned",
        "to the home he made for Glarial",
        "under the Baxtorian Waterfall.",
        "Once he entered he never",
        "returned. Only Glarial had the",
        "power to also enter. Since",
        "Baxtorian entered, no one but",
        "her can follow him in.",
    ],
    [
        "The power of nature",
        "",
        "    Glarial and Baxtorian were",
        "masters of nature. Trees would",
        "grow, hills form and rivers",
        "flood on their command.",
        "Baxtorian in particular had",
        "perfected rune lore. It was",
        "said that he could use the",
        "stones to control water, earth,",
        "and air.",
        "",
    ],
]
